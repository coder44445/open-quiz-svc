services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Optional: run Ollama locally if you want the AI provider in-compose.
  # Uncomment if you have an image and want to include it.
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"

  app:
    build: .
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/fastapi
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen3.5:0.8b
    ports:
      - "8000:8000"
    healthcheck:
      # /healthz checks DB and Redis connectivity.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ARQ background worker that processes AI question-generation jobs.
  # Shares the same image as the app service — no separate Dockerfile needed.
  worker:
    build: .
    # Override the default entrypoint so the container runs the ARQ worker
    # instead of uvicorn.
    entrypoint: ["python", "-m", "arq", "app.ai.worker.WorkerSettings"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/fastapi
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen3.5:0.8b

volumes:
  db_data:
